<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビンゴチャレンジ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0c0c0c; color: #f0f0f0; min-height: 100vh; }

.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ===== SETUP ===== */
#screen-setup { align-items: center; justify-content: center; padding: 2rem 1rem; }
.setup-box {
  background: #181818; border: 1px solid #2a2a2a;
  border-radius: 20px; padding: 2rem;
  width: 100%; max-width: 460px;
}
.logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
.logo span { color: #ffe600; }
.sub { font-size: 13px; color: #666; margin-bottom: 2rem; }

.field { margin-bottom: 1.25rem; }
.field-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px; }
input[type=password] {
  width: 100%; padding: 11px 14px;
  background: #0e0e0e; border: 1px solid #2a2a2a;
  border-radius: 10px; color: #f0f0f0; font-size: 14px;
  outline: none; transition: border-color 0.15s;
}
input[type=password]:focus { border-color: #444; }

.size-row { display: flex; gap: 6px; flex-wrap: wrap; }
.sz {
  padding: 7px 12px; font-size: 13px; font-weight: 500;
  border: 1px solid #2a2a2a; border-radius: 8px;
  background: #0e0e0e; color: #888; cursor: pointer;
  transition: all 0.12s;
}
.sz:hover { color: #f0f0f0; border-color: #444; }
.sz.on { background: #ffe600; color: #0c0c0c; border-color: #ffe600; font-weight: 700; }

.upload-zone {
  border: 1.5px dashed #2a2a2a; border-radius: 12px;
  padding: 1.75rem 1rem; text-align: center; cursor: pointer;
  transition: all 0.2s;
}
.upload-zone:hover { border-color: #444; background: #111; }
.upload-zone.ready { border-color: #4a9a4a; background: #0a1a0a; }
.upload-icon { font-size: 30px; margin-bottom: 8px; }
.upload-zone p { font-size: 13px; color: #666; }
.upload-zone .fname { font-size: 12px; color: #5cb85c; margin-top: 6px; font-weight: 500; }
#fileInput { display: none; }

.btn-start {
  width: 100%; padding: 13px;
  background: #ffe600; color: #0c0c0c;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  margin-top: 0.25rem;
}
.btn-start:hover { opacity: 0.88; }
.btn-start:active { transform: scale(0.98); }
.btn-start:disabled { opacity: 0.25; cursor: not-allowed; }

/* ===== LOADING ===== */
#screen-loading { align-items: center; justify-content: center; }
.loading-box { text-align: center; padding: 2rem; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid #222; border-top-color: #ffe600;
  border-radius: 50%; animation: spin 0.75s linear infinite;
  margin: 0 auto 1.25rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.loading-sub { font-size: 13px; color: #666; }

/* ===== GAME ===== */
#screen-game { align-items: center; background: #0c0c0c; }

.game-header {
  width: 100%; max-width: 680px;
  padding: 1rem 1rem 0;
  display: flex; align-items: center; justify-content: space-between;
}
.stat { text-align: center; }
.stat-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 20px; font-weight: 700; }

.card-wrap {
  position: relative;
  max-width: 680px; width: 100%;
  padding: 0.75rem 1rem 0;
}
#gameCanvas { width: 100%; display: block; border-radius: 12px; }
.game-svg {
  position: absolute;
  pointer-events: none;
  border-radius: 12px;
  overflow: hidden;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.55; }
}
.hl-rect { animation: pulse 1s ease-in-out infinite; }

.task-panel {
  width: 100%; max-width: 680px;
  padding: 0.75rem 1rem 1.5rem;
}
.task-card {
  background: #181818; border: 1px solid #2a2a2a;
  border-radius: 16px; padding: 1.25rem 1.25rem 1.25rem;
}
.task-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.task-cell-id { font-size: 11px; color: #555; }
.task-status { font-size: 11px; color: #ffe600; font-weight: 600; }
.task-text { font-size: 18px; font-weight: 600; line-height: 1.45; margin-bottom: 1rem; }
.task-text.reading { font-size: 14px; color: #555; font-weight: 400; }

.timer-num {
  font-size: 52px; font-weight: 800; text-align: center;
  font-variant-numeric: tabular-nums; letter-spacing: -2px;
  margin-bottom: 8px; transition: color 0.3s;
}
.timer-num.red { color: #ff4040; }
.bar-wrap { background: #111; border-radius: 99px; height: 5px; overflow: hidden; margin-bottom: 1rem; }
.bar { height: 100%; border-radius: 99px; background: #ffe600; transition: width 1s linear, background 0.3s; }
.bar.red { background: #ff4040; }

.btn-done {
  width: 100%; padding: 14px;
  background: #2a7a2a; color: #fff;
  border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.3px;
}
.btn-done:hover { background: #39943a; }
.btn-done:active { transform: scale(0.98); }

/* ===== INTERVAL OVERLAY ===== */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  align-items: center; justify-content: center;
  z-index: 100; flex-direction: column;
}
.overlay.show { display: flex; }
.big-count {
  font-size: 110px; font-weight: 900; color: #ffe600;
  letter-spacing: -4px; line-height: 1;
  animation: pop 0.25s ease-out;
}
@keyframes pop { from { transform:scale(1.5); opacity:0; } to { transform:scale(1); opacity:1; } }
.overlay-msg { font-size: 15px; color: #666; margin-top: 12px; }

/* ===== BINGO OVERLAY ===== */
#bingo-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.95);
  align-items: center; justify-content: center;
  z-index: 200; flex-direction: column; text-align: center; padding: 2rem;
}
#bingo-overlay.show { display: flex; }
.bingo-emoji { font-size: 60px; margin-bottom: 12px; }
.bingo-word { font-size: 64px; font-weight: 900; color: #ffe600; letter-spacing: -2px; margin-bottom: 8px; }
.bingo-sub { font-size: 15px; color: #888; margin-bottom: 2rem; }
.btn-replay {
  padding: 12px 36px; background: #ffe600; color: #0c0c0c;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
}

/* ===== ADJUST SCREEN ===== */
#screen-adjust { align-items: center; padding: 1rem; background: #0a0a0a; }
.adjust-header { text-align: center; max-width: 680px; width: 100%; margin: 0 auto 1rem; }
.adjust-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.adjust-sub { font-size: 12px; color: #888; }

.adjust-wrap {
  position: relative;
  max-width: 680px; width: 100%;
  margin: 0 auto 1rem;
  user-select: none;
  touch-action: none;
}
#adjustCanvas { width: 100%; display: block; border-radius: 10px; }
.adjust-svg { position: absolute; top: 0; left: 0; pointer-events: none; }

.handle {
  position: absolute;
  width: 28px; height: 28px;
  margin-left: -14px; margin-top: -14px;
  background: #ffe600;
  border: 3px solid #0c0c0c;
  border-radius: 50%;
  cursor: grab;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  touch-action: none;
  z-index: 10;
}
.handle:active { cursor: grabbing; transform: scale(1.15); }
.handle::after {
  content: ''; position: absolute; inset: -12px;
}

.adjust-actions {
  display: flex; gap: 10px;
  max-width: 680px; width: 100%;
  margin: 0 auto;
}
.btn-adjust-reset {
  flex: 1; padding: 11px;
  background: transparent; color: #f0f0f0;
  border: 1.5px solid #2a2a2a; border-radius: 10px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: border-color 0.15s;
}
.btn-adjust-reset:hover { border-color: #555; }
.btn-adjust-go {
  flex: 2; padding: 11px;
  background: #ffe600; color: #0c0c0c;
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s;
}
.btn-adjust-go:hover { opacity: 0.88; }

.btn-retire {
  width: 100%; padding: 10px;
  margin-top: 10px;
  background: transparent;
  color: #7ad4ff;
  border: 1.5px solid #355668;
  border-radius: 10px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.btn-retire:hover { background: #1a2a33; border-color: #7ad4ff; }

/* ===== END / RETIRE SCREEN ===== */
#screen-end { align-items: center; padding: 2rem 1rem; background: #0c0c0c; }
.end-wrap {
  width: 100%; max-width: 680px;
  text-align: center;
}
.end-emoji { font-size: 64px; margin-bottom: 8px; line-height: 1; }
.end-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
.end-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }

.end-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.end-stat { background: #181818; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 10px; }
.end-stat-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.end-stat-value { font-size: 22px; font-weight: 700; }

.end-card-wrap {
  position: relative;
  border-radius: 12px;
  margin-bottom: 1.5rem;
}
#endCanvas { width: 100%; display: block; border-radius: 12px; }
.end-svg { position: absolute; top: 0; left: 0; pointer-events: none; border-radius: 12px; overflow: hidden; }

.end-actions { display: flex; flex-direction: column; gap: 10px; }
.btn-restart-full {
  padding: 13px;
  background: #ffe600; color: #0c0c0c;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s;
}
.btn-restart-full:hover { opacity: 0.88; }
.btn-restart-new {
  padding: 13px;
  background: transparent; color: #f0f0f0;
  border: 1.5px solid #2a2a2a; border-radius: 10px;
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: all 0.15s;
}
.btn-restart-new:hover { border-color: #555; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="screen-setup" class="screen active">
  <div class="setup-box">
    <div class="logo">BINGO<span>.</span></div>
    <div class="sub">写真から自動読み取り・全自動進行</div>

    <div class="field">
      <div class="field-label">Google Gemini API キー</div>
      <input type="password" id="apiKey" placeholder="AIza..." oninput="checkReady()">
    </div>

    <div class="field">
      <div class="field-label">グリッドサイズ</div>
      <div class="size-row" id="sizeRow">
        <div class="sz" onclick="setSize(4,this)">4×4</div>
        <div class="sz on" onclick="setSize(5,this)">5×5</div>
        <div class="sz" onclick="setSize(6,this)">6×6</div>
        <div class="sz" onclick="setSize(7,this)">7×7</div>
        <div class="sz" onclick="setSize(8,this)">8×8</div>
        <div class="sz" onclick="setSize(9,this)">9×9</div>
        <div class="sz" onclick="setSize(10,this)">10×10</div>
      </div>
    </div>

    <div class="field">
      <div class="field-label">ビンゴカード写真</div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📷</div>
        <p>クリックして画像を選択</p>
        <div class="fname" id="fname"></div>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="onFile(event)">
    </div>

    <button class="btn-start" id="btnStart" onclick="startAnalysis()" disabled>AI解析してゲーム開始 🎲</button>
  </div>
</div>

<!-- LOADING -->
<div id="screen-loading" class="screen">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-title" id="loadTitle">ビンゴカードを解析中...</div>
    <div class="loading-sub" id="loadSub">AIが各マスのお題を読み取っています</div>
  </div>
</div>

<!-- ADJUST SCREEN -->
<div id="screen-adjust" class="screen">
  <div class="adjust-header">
    <h2 class="adjust-title">グリッド位置を調整</h2>
    <p class="adjust-sub">4つの角をドラッグして、ビンゴカードの範囲に合わせてください</p>
  </div>
  <div class="adjust-wrap" id="adjustWrap">
    <canvas id="adjustCanvas"></canvas>
    <svg class="adjust-svg" id="adjustSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    <div class="handle" id="handleTL" data-corner="tl"></div>
    <div class="handle" id="handleTR" data-corner="tr"></div>
    <div class="handle" id="handleBL" data-corner="bl"></div>
    <div class="handle" id="handleBR" data-corner="br"></div>
  </div>
  <div class="adjust-actions">
    <button class="btn-adjust-reset" onclick="resetAdjust()">AI推定に戻す</button>
    <button class="btn-adjust-go" onclick="confirmAdjust()">この範囲で開始 →</button>
  </div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="stat">
      <div class="stat-label">完了</div>
      <div class="stat-value"><span id="sDone">0</span>/<span id="sTotal">0</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">ビンゴ</div>
      <div class="stat-value" id="sBingo">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">残り</div>
      <div class="stat-value" id="sRemain">0</div>
    </div>
  </div>

  <div class="card-wrap">
    <canvas id="gameCanvas"></canvas>
    <svg class="game-svg" id="gameSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
  </div>

  <div class="task-panel">
    <div class="task-card">
      <div class="task-label-row">
        <span class="task-cell-id" id="cellId">—</span>
        <span class="task-status" id="taskStatus">抽選中...</span>
      </div>
      <div class="task-text reading" id="taskText">マスを選んでいます...</div>
      <div id="timerWrap" class="hidden">
        <div class="timer-num" id="timerNum">0:00</div>
        <div class="bar-wrap"><div class="bar" id="bar" style="width:100%"></div></div>
      </div>
      <button class="btn-done hidden" id="btnDone" onclick="completeCurrent()">✓ 完了！</button>
      <button class="btn-retire" id="btnRetire" onclick="confirmRetire()">💧 リタイア</button>
    </div>
  </div>
</div>

<!-- END / RETIRE SCREEN -->
<div id="screen-end" class="screen">
  <div class="end-wrap">
    <div class="end-emoji" id="endEmoji">💧</div>
    <div class="end-title" id="endTitle">リタイアしました</div>
    <div class="end-sub" id="endSub">お疲れさまでした</div>
    <div class="end-stats">
      <div class="end-stat"><div class="end-stat-label">完了</div><div class="end-stat-value" id="endDone">0</div></div>
      <div class="end-stat"><div class="end-stat-label">リタイア</div><div class="end-stat-value" id="endRetired">0</div></div>
      <div class="end-stat"><div class="end-stat-label">ビンゴ</div><div class="end-stat-value" id="endBingo">0</div></div>
    </div>
    <div class="end-card-wrap" id="endCardWrap">
      <canvas id="endCanvas"></canvas>
      <svg class="end-svg" id="endSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    </div>
    <div class="end-actions">
      <button class="btn-restart-full" onclick="restartSameCard()">🔄 同じカードでやり直す</button>
      <button class="btn-restart-new" onclick="location.reload()">📷 新しいカードで始める</button>
    </div>
  </div>
</div>

<!-- INTERVAL OVERLAY -->
<div class="overlay" id="intervalOverlay">
  <div class="big-count" id="bigCount">5</div>
  <div class="overlay-msg">次のマスを抽選します...</div>
</div>

<script>
// ===== STATE =====
let N = 5;
let apiKey = '';
let imgDataURL = null;
let imgMime = 'image/jpeg';
let cardImg = null;

// cells[i] = {row, col, text, timerMin, done}
let cells = [];
let doneSet = new Set();
let retiredSet = new Set();
let currentIdx = null;
let taskTimer = null;
let taskTotal = 0, taskLeft = 0;
let audioCtx = null;
let prevBingo = 0;

// ===== SETUP =====
function setSize(n, el) {
  N = n;
  document.querySelectorAll('.sz').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

function onFile(e) {
  const f = e.target.files[0]; if (!f) return;
  imgMime = f.type || 'image/jpeg';
  document.getElementById('fname').textContent = f.name;
  document.getElementById('uploadZone').classList.add('ready');
  const reader = new FileReader();
  reader.onload = ev => { imgDataURL = ev.target.result; checkReady(); };
  reader.readAsDataURL(f);
}

function checkReady() {
  const ok = imgDataURL && document.getElementById('apiKey').value.trim();
  document.getElementById('btnStart').disabled = !ok;
}

// ===== GEMINI API HELPER =====
async function callGemini(prompt, b64, mime) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
  const parts = [];
  if (b64) {
    // Gemini accepts common image mime types. Normalize unusual ones.
    const normalized = (mime && /^image\/(jpeg|png|webp|heic|heif)$/i.test(mime)) ? mime : 'image/jpeg';
    parts.push({ inline_data: { mime_type: normalized, data: b64 } });
  }
  parts.push({ text: prompt });

  let res, data;
  try {
    res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts }],
        generationConfig: {
          temperature: 0.2,
          maxOutputTokens: 8192,
          responseMimeType: 'application/json'
        }
      })
    });
  } catch(netErr) {
    throw new Error('ネットワークエラー: ' + netErr.message);
  }

  try {
    data = await res.json();
  } catch {
    throw new Error(`HTTP ${res.status}: レスポンスのパースに失敗`);
  }

  if (!res.ok) {
    const msg = data?.error?.message || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  if (data.error) throw new Error(data.error.message);

  // Check for blocked/safety responses
  const cand = data.candidates?.[0];
  if (!cand) throw new Error('Geminiから応答がありませんでした（プロンプトがブロックされた可能性）');
  if (cand.finishReason && cand.finishReason !== 'STOP' && cand.finishReason !== 'MAX_TOKENS') {
    throw new Error(`応答が中断されました: ${cand.finishReason}`);
  }

  const text = cand.content?.parts?.map(p => p.text||'').join('') || '';
  if (!text.trim()) throw new Error('空の応答が返ってきました');
  return text;
}

// ===== FULL CARD ANALYSIS =====
async function startAnalysis() {
  apiKey = document.getElementById('apiKey').value.trim();
  showScreen('screen-loading');

  // Load image
  await new Promise(resolve => {
    cardImg = new Image();
    cardImg.onload = resolve;
    cardImg.src = imgDataURL;
  });

  const b64 = imgDataURL.split(',')[1];

  try {
    setLoad('カード全体を解析中...', `${N}×${N} のマスをすべて読み取っています`);

    const prompt = `このビンゴカード画像を解析してください。グリッドは${N}×${N}です。

各マスのテキストとタイマー情報を読み取り、以下のJSON形式のみで返してください（コードブロック・説明文不要）:

{
  "grid": {
    "top": <グリッド上端の位置（画像高さに対する割合 0.0〜1.0）>,
    "left": <グリッド左端（画像幅に対する割合）>,
    "bottom": <グリッド下端>,
    "right": <グリッド右端>
  },
  "cells": [
    {"row":0,"col":0,"text":"マスのテキスト","minutes":null},
    {"row":0,"col":1,"text":"5分間待機","minutes":5}
  ]
}

- cellsは左上から右方向、行ごとに${N*N}個
- minutesは時間指定がある場合のみ数値（「30秒」→0.5、「5分」→5）、なければnull
- gridは画像内のビンゴカードのグリッド部分の位置を割合で指定`;

    const raw = await callGemini(prompt, b64, imgMime);
    let parsed = safeJSON(raw);

    if (!parsed || !Array.isArray(parsed.cells) || parsed.cells.length === 0) {
      setLoad('再解析中...', 'もう少しお待ちください');
      const raw2 = await callGemini(
        `上記の画像（${N}×${N}ビンゴカード）の内容を、必ずこのJSON形式のみで返してください:
{"grid":{"top":0.1,"left":0.05,"bottom":0.95,"right":0.95},"cells":[{"row":0,"col":0,"text":"内容","minutes":null},...]}`,
        b64, imgMime
      );
      parsed = safeJSON(raw2);
    }

    if (!parsed || !Array.isArray(parsed.cells)) throw new Error('解析に失敗しました。APIキーとグリッドサイズを確認してください。');

    // Build state
    cells = Array.from({length: N*N}, (_, i) => {
      const r = Math.floor(i / N), c = i % N;
      const found = parsed.cells.find(cell => cell.row === r && cell.col === c);
      return {
        row: r, col: c,
        text: found?.text || `マス(${r+1},${c+1})`,
        timerMin: found?.minutes || null,
        done: false,
        gridBounds: parsed.grid || {top:0.05, left:0.05, bottom:0.95, right:0.95}
      };
    });

    // Store grid bounds globally
    window.gridBounds = parsed.grid || {top:0.05, left:0.05, bottom:0.95, right:0.95};
    window.aiGridBounds = {...window.gridBounds};  // Remember AI's original estimate

    showAdjustScreen();

  } catch(err) {
    console.error('解析エラー:', err);
    showScreen('screen-setup');
    alert('エラー: ' + err.message + '\n\n詳細はブラウザのコンソール(F12)を確認してください');
  }
}

function setLoad(title, sub) {
  document.getElementById('loadTitle').textContent = title;
  document.getElementById('loadSub').textContent = sub;
}

// ===== GAME SCREEN INIT =====
function initGameScreen() {
  doneSet.clear(); retiredSet.clear(); prevBingo = 0;
  document.getElementById('sTotal').textContent = cells.length;
  document.getElementById('sDone').textContent = 0;
  document.getElementById('sRemain').textContent = cells.length;
  document.getElementById('sBingo').textContent = 0;

  const canvas = document.getElementById('gameCanvas');
  const wrap = document.querySelector('.card-wrap');
  const maxW = wrap.clientWidth - 32;
  const displayW = maxW;
  const displayH = Math.round(cardImg.naturalHeight * maxW / cardImg.naturalWidth);
  canvas.width = cardImg.naturalWidth;
  canvas.height = cardImg.naturalHeight;
  canvas.style.width = displayW + 'px';
  canvas.style.height = displayH + 'px';

  const ctx = canvas.getContext('2d');
  ctx.drawImage(cardImg, 0, 0);

  // Align SVG overlay to canvas display position (canvas has padding on its wrap)
  const svg = document.getElementById('gameSvg');
  svg.innerHTML = '';
  svg.style.left = '1rem';
  svg.style.top = '0.75rem';
  svg.style.width = displayW + 'px';
  svg.style.height = displayH + 'px';
}

// ===== CELL RECT =====
function getCellRect(idx) {
  const gb = window.gridBounds || {top:0.05, left:0.05, bottom:0.95, right:0.95};
  const {top, left, bottom, right} = gb;
  const gw = (right - left) * 100;
  const gh = (bottom - top) * 100;
  const cw = gw / N, ch = gh / N;
  const {row, col} = cells[idx];
  return {
    x: left*100 + col*cw,
    y: top*100 + row*ch,
    w: cw, h: ch
  };
}

// ===== PICK NEXT =====
function pickNext() {
  const avail = cells.map((_,i)=>i).filter(i=>!cells[i].done);
  if (!avail.length) return;
  currentIdx = avail[Math.floor(Math.random() * avail.length)];
  showCurrentCell();
}

function showCurrentCell() {
  const cell = cells[currentIdx];
  const {row, col} = cell;

  document.getElementById('cellId').textContent = `行${row+1} / 列${col+1}`;
  document.getElementById('taskStatus').textContent = '▶ 挑戦中';
  document.getElementById('taskText').textContent = cell.text;
  document.getElementById('taskText').classList.remove('reading');
  document.getElementById('timerWrap').classList.add('hidden');
  document.getElementById('btnDone').classList.add('hidden');

  highlightCurrentCell();

  if (cell.timerMin && cell.timerMin > 0) {
    startTimer(cell.timerMin);
  } else {
    document.getElementById('btnDone').classList.remove('hidden');
  }
}

// ===== HIGHLIGHT =====
function highlightCurrentCell() {
  const svg = document.getElementById('gameSvg');
  // remove old highlight
  svg.querySelectorAll('.hl').forEach(e => e.remove());

  const {x, y, w, h} = getCellRect(currentIdx);
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('class', 'hl hl-rect');
  rect.setAttribute('x', x + 0.5); rect.setAttribute('y', y + 0.5);
  rect.setAttribute('width', w - 1); rect.setAttribute('height', h - 1);
  rect.setAttribute('fill', 'rgba(255,230,0,0.15)');
  rect.setAttribute('stroke', '#ffe600');
  rect.setAttribute('stroke-width', '1.2');
  rect.setAttribute('rx', '1');
  svg.appendChild(rect);
}

// ===== TIMER =====
function startTimer(minutes) {
  taskTotal = Math.round(minutes * 60);
  taskLeft = taskTotal;
  document.getElementById('timerWrap').classList.remove('hidden');
  renderTimer();

  taskTimer = setInterval(() => {
    taskLeft = Math.max(0, taskLeft - 1);
    renderTimer();
    if (taskLeft === 0) {
      clearInterval(taskTimer); taskTimer = null;
      completeCurrent();
    }
  }, 1000);
}

function renderTimer() {
  const m = Math.floor(taskLeft/60), s = taskLeft%60;
  const el = document.getElementById('timerNum');
  el.textContent = `${m}:${String(s).padStart(2,'0')}`;
  const pct = taskTotal ? taskLeft/taskTotal*100 : 0;
  document.getElementById('bar').style.width = pct + '%';
  const urgent = taskLeft <= 10;
  el.classList.toggle('red', urgent);
  document.getElementById('bar').classList.toggle('red', urgent);
}

// ===== COMPLETE =====
function completeCurrent() {
  if (currentIdx === null) return;
  if (taskTimer) { clearInterval(taskTimer); taskTimer = null; }

  cells[currentIdx].done = true;
  doneSet.add(currentIdx);

  drawCheck(currentIdx);
  updateStats();

  // remove highlight
  document.getElementById('gameSvg').querySelectorAll('.hl').forEach(e=>e.remove());
  document.getElementById('timerWrap').classList.add('hidden');
  document.getElementById('btnDone').classList.add('hidden');
  document.getElementById('taskStatus').textContent = '✓ 完了';

  const bingo = calcBingo();
  if (bingo > prevBingo) {
    prevBingo = bingo;
    showBingo(`${bingo}列でビンゴ達成！`);
    return;
  }

  if (!cells.find(c=>!c.done)) {
    showBingo('全マスクリア！完全制覇！');
    return;
  }

  startInterval();
}

function drawCheck(idx, targetSvg) {
  const svg = targetSvg || document.getElementById('gameSvg');
  const {x, y, w, h} = getCellRect(idx);
  const cx = x + w/2, cy = y + h/2;
  const r = Math.min(w, h) * 0.28;

  const fill = document.createElementNS('http://www.w3.org/2000/svg','rect');
  fill.setAttribute('x', x); fill.setAttribute('y', y);
  fill.setAttribute('width', w); fill.setAttribute('height', h);
  fill.setAttribute('fill', 'rgba(34,140,34,0.5)');
  svg.appendChild(fill);

  const circ = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circ.setAttribute('cx', cx); circ.setAttribute('cy', cy); circ.setAttribute('r', r);
  circ.setAttribute('fill', 'rgba(20,120,20,0.92)');
  svg.appendChild(circ);

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  const x1=cx-r*.48, y1=cy, x2=cx-r*.1, y2=cy+r*.45, x3=cx+r*.52, y3=cy-r*.42;
  path.setAttribute('d', `M${x1} ${y1} L${x2} ${y2} L${x3} ${y3}`);
  path.setAttribute('stroke','#fff'); path.setAttribute('stroke-width', r*.32);
  path.setAttribute('fill','none'); path.setAttribute('stroke-linecap','round');
  svg.appendChild(path);
}

// ===== BINGO CHECK =====
function calcBingo() {
  const n = N, lines = [];
  for (let r=0;r<n;r++) lines.push(Array.from({length:n},(_,c)=>r*n+c));
  for (let c=0;c<n;c++) lines.push(Array.from({length:n},(_,r)=>r*n+c));
  lines.push(Array.from({length:n},(_,i)=>i*n+i));
  lines.push(Array.from({length:n},(_,i)=>i*n+(n-1-i)));
  return lines.filter(line=>line.every(i=>cells[i].done)).length;
}

function showBingo(msg) {
  playBingo();
  // Show end screen after a brief celebratory moment
  setTimeout(() => {
    const isAllDone = !cells.find(c => !c.done);
    endGame(isAllDone ? 'allclear' : 'bingo');
  }, 300);
}

// ===== STATS =====
function updateStats() {
  const done = doneSet.size;
  document.getElementById('sDone').textContent = done;
  document.getElementById('sRemain').textContent = cells.length - done;
  document.getElementById('sBingo').textContent = calcBingo();
}

// ===== INTERVAL =====
function startInterval() {
  const ov = document.getElementById('intervalOverlay');
  ov.classList.add('show');
  let c = 5;
  document.getElementById('bigCount').textContent = c;
  beep(880, 0.08);

  const iv = setInterval(() => {
    c--;
    const el = document.getElementById('bigCount');
    el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
    el.textContent = c;
    beep(c === 0 ? 1320 : 660, 0.08);
    if (c <= 0) {
      clearInterval(iv);
      ov.classList.remove('show');
      pickNext();
    }
  }, 1000);
}

// ===== AUDIO =====
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e){}
}
function playBingo() {
  [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,.35),i*120));
}

// ===== ADJUST SCREEN =====
let adjustCorners = null;  // {tl, tr, bl, br} each {x,y} in ratio 0-1
let adjustImgSize = null;  // {w, h} in display pixels
let draggingCorner = null;

function showAdjustScreen() {
  showScreen('screen-adjust');
  // small delay to ensure layout
  setTimeout(setupAdjustCanvas, 50);
}

function setupAdjustCanvas() {
  const canvas = document.getElementById('adjustCanvas');
  const wrap = document.getElementById('adjustWrap');
  const maxW = wrap.clientWidth;
  const displayW = maxW;
  const displayH = Math.round(cardImg.naturalHeight * maxW / cardImg.naturalWidth);
  canvas.width = cardImg.naturalWidth;
  canvas.height = cardImg.naturalHeight;
  canvas.style.width = displayW + 'px';
  canvas.style.height = displayH + 'px';
  canvas.getContext('2d').drawImage(cardImg, 0, 0);

  const svg = document.getElementById('adjustSvg');
  svg.style.width = displayW + 'px';
  svg.style.height = displayH + 'px';

  adjustImgSize = {w: displayW, h: displayH};

  // Initial corners from AI estimate (convert bounds -> 4 corners)
  const b = window.gridBounds;
  adjustCorners = {
    tl: {x: b.left,  y: b.top},
    tr: {x: b.right, y: b.top},
    bl: {x: b.left,  y: b.bottom},
    br: {x: b.right, y: b.bottom}
  };

  renderAdjustOverlay();
  setupHandleDrag();
}

function renderAdjustOverlay() {
  const svg = document.getElementById('adjustSvg');
  svg.innerHTML = '';
  const c = adjustCorners;

  // Outer polygon (shows the selected region)
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points',
    `${c.tl.x*100},${c.tl.y*100} ${c.tr.x*100},${c.tr.y*100} ${c.br.x*100},${c.br.y*100} ${c.bl.x*100},${c.bl.y*100}`);
  poly.setAttribute('fill', 'rgba(255,230,0,0.08)');
  poly.setAttribute('stroke', '#ffe600');
  poly.setAttribute('stroke-width', '0.4');
  poly.setAttribute('vector-effect', 'non-scaling-stroke');
  svg.appendChild(poly);

  // Grid lines inside (assuming mostly rectangular)
  const top = Math.min(c.tl.y, c.tr.y);
  const bottom = Math.max(c.bl.y, c.br.y);
  const left = Math.min(c.tl.x, c.bl.x);
  const right = Math.max(c.tr.x, c.br.x);

  for (let r = 1; r < N; r++) {
    const y = (top + (bottom-top) * r/N) * 100;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', left*100); line.setAttribute('y1', y);
    line.setAttribute('x2', right*100); line.setAttribute('y2', y);
    line.setAttribute('stroke', 'rgba(255,230,0,0.4)'); line.setAttribute('stroke-width', '0.2');
    svg.appendChild(line);
  }
  for (let col = 1; col < N; col++) {
    const x = (left + (right-left) * col/N) * 100;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x); line.setAttribute('y1', top*100);
    line.setAttribute('x2', x); line.setAttribute('y2', bottom*100);
    line.setAttribute('stroke', 'rgba(255,230,0,0.4)'); line.setAttribute('stroke-width', '0.2');
    svg.appendChild(line);
  }

  // Position handles on top of the image
  const {w, h} = adjustImgSize;
  document.getElementById('handleTL').style.left = (c.tl.x * w) + 'px';
  document.getElementById('handleTL').style.top  = (c.tl.y * h) + 'px';
  document.getElementById('handleTR').style.left = (c.tr.x * w) + 'px';
  document.getElementById('handleTR').style.top  = (c.tr.y * h) + 'px';
  document.getElementById('handleBL').style.left = (c.bl.x * w) + 'px';
  document.getElementById('handleBL').style.top  = (c.bl.y * h) + 'px';
  document.getElementById('handleBR').style.left = (c.br.x * w) + 'px';
  document.getElementById('handleBR').style.top  = (c.br.y * h) + 'px';
}

function setupHandleDrag() {
  document.querySelectorAll('.handle').forEach(h => {
    h.onpointerdown = startDrag;
  });
}

function startDrag(e) {
  e.preventDefault();
  draggingCorner = e.currentTarget.dataset.corner;
  e.currentTarget.setPointerCapture(e.pointerId);
  e.currentTarget.onpointermove = onDrag;
  e.currentTarget.onpointerup = endDrag;
  e.currentTarget.onpointercancel = endDrag;
}

function onDrag(e) {
  if (!draggingCorner) return;
  const canvas = document.getElementById('adjustCanvas');
  const rect = canvas.getBoundingClientRect();
  let rx = (e.clientX - rect.left) / rect.width;
  let ry = (e.clientY - rect.top) / rect.height;
  rx = Math.max(0, Math.min(1, rx));
  ry = Math.max(0, Math.min(1, ry));
  adjustCorners[draggingCorner] = {x: rx, y: ry};
  renderAdjustOverlay();
}

function endDrag(e) {
  draggingCorner = null;
  if (e.currentTarget) {
    e.currentTarget.onpointermove = null;
    e.currentTarget.onpointerup = null;
  }
}

function resetAdjust() {
  window.gridBounds = {...window.aiGridBounds};
  const b = window.gridBounds;
  adjustCorners = {
    tl: {x: b.left,  y: b.top},
    tr: {x: b.right, y: b.top},
    bl: {x: b.left,  y: b.bottom},
    br: {x: b.right, y: b.bottom}
  };
  renderAdjustOverlay();
}

function confirmAdjust() {
  // Convert 4 corners back to bounding box (axis-aligned)
  const c = adjustCorners;
  window.gridBounds = {
    top:    Math.min(c.tl.y, c.tr.y),
    bottom: Math.max(c.bl.y, c.br.y),
    left:   Math.min(c.tl.x, c.bl.x),
    right:  Math.max(c.tr.x, c.br.x)
  };
  initGameScreen();
  showScreen('screen-game');
  pickNext();
}

// ===== RETIRE / END =====
function confirmRetire() {
  if (!confirm('リタイアしますか？\n現在挑戦中のマスには水滴マークがつきます。')) return;
  retireCurrent();
  endGame('retire');
}

function retireCurrent() {
  if (currentIdx === null) return;
  if (taskTimer) { clearInterval(taskTimer); taskTimer = null; }
  // Mark current cell as retired (not done!)
  retiredSet.add(currentIdx);
  drawDroplet(currentIdx, document.getElementById('gameSvg'));
}

function endGame(reason) {
  // Stop timers
  if (taskTimer) { clearInterval(taskTimer); taskTimer = null; }

  // Setup end screen
  const endEmoji = document.getElementById('endEmoji');
  const endTitle = document.getElementById('endTitle');
  const endSub = document.getElementById('endSub');
  if (reason === 'retire') {
    endEmoji.textContent = '💧';
    endTitle.textContent = 'リタイアしました';
    endSub.textContent = 'お疲れさまでした';
  } else if (reason === 'bingo') {
    endEmoji.textContent = '🎉';
    endTitle.textContent = 'BINGO クリア！';
    endSub.textContent = 'おめでとうございます';
  } else {
    endEmoji.textContent = '🏆';
    endTitle.textContent = '全マス完了！';
    endSub.textContent = '完全制覇おめでとうございます';
  }

  document.getElementById('endDone').textContent = doneSet.size;
  document.getElementById('endRetired').textContent = retiredSet.size;
  document.getElementById('endBingo').textContent = calcBingo();

  // Draw the final card state on the end screen
  const endCanvas = document.getElementById('endCanvas');
  const wrap = document.getElementById('endCardWrap');
  const maxW = wrap.clientWidth || 600;
  const displayW = maxW;
  const displayH = Math.round(cardImg.naturalHeight * maxW / cardImg.naturalWidth);
  endCanvas.width = cardImg.naturalWidth;
  endCanvas.height = cardImg.naturalHeight;
  endCanvas.style.width = displayW + 'px';
  endCanvas.style.height = displayH + 'px';
  endCanvas.getContext('2d').drawImage(cardImg, 0, 0);

  const endSvg = document.getElementById('endSvg');
  endSvg.innerHTML = '';
  endSvg.style.width = displayW + 'px';
  endSvg.style.height = displayH + 'px';

  // Redraw checks and droplets on end screen
  doneSet.forEach(i => drawCheck(i, endSvg));
  retiredSet.forEach(i => drawDroplet(i, endSvg));

  showScreen('screen-end');
}

function restartSameCard() {
  // Reset state, keep cells/cardImg/gridBounds
  cells.forEach(c => c.done = false);
  doneSet.clear(); retiredSet.clear(); prevBingo = 0;
  currentIdx = null;
  if (taskTimer) { clearInterval(taskTimer); taskTimer = null; }

  initGameScreen();
  showScreen('screen-game');
  pickNext();
}

// ===== DROPLET SVG =====
function drawDroplet(idx, targetSvg) {
  const svg = targetSvg || document.getElementById('gameSvg');
  const {x, y, w, h} = getCellRect(idx);

  // Semi-transparent blue overlay on cell
  const fill = document.createElementNS('http://www.w3.org/2000/svg','rect');
  fill.setAttribute('x', x); fill.setAttribute('y', y);
  fill.setAttribute('width', w); fill.setAttribute('height', h);
  fill.setAttribute('fill', 'rgba(135,220,255,0.35)');
  svg.appendChild(fill);

  // Two stylized droplets (comma-like teardrops) matching reference
  const cx = x + w/2, cy = y + h/2;
  const scale = Math.min(w, h) * 0.38;

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform', `translate(${cx}, ${cy})`);

  // First droplet (upper-left, tilted)
  const drop1 = document.createElementNS('http://www.w3.org/2000/svg','path');
  drop1.setAttribute('d', 'M 0 0 Q -0.6 -0.9 -0.3 -1.3 Q 0.1 -1.6 0.4 -1.2 Q 0.7 -0.6 0.3 -0.1 Q -0.1 0.3 0 0 Z');
  drop1.setAttribute('fill', '#a8e8ff');
  drop1.setAttribute('transform', `translate(-${scale*0.4}, -${scale*0.2}) scale(${scale}) rotate(-15)`);
  g.appendChild(drop1);

  // Second droplet (lower-right, larger)
  const drop2 = document.createElementNS('http://www.w3.org/2000/svg','path');
  drop2.setAttribute('d', 'M 0 0 Q -0.8 -1.1 -0.4 -1.5 Q 0.2 -1.9 0.6 -1.3 Q 1.0 -0.6 0.4 -0.1 Q -0.2 0.3 0 0 Z');
  drop2.setAttribute('fill', '#7ad4ff');
  drop2.setAttribute('transform', `translate(${scale*0.2}, ${scale*0.3}) scale(${scale*1.3}) rotate(25)`);
  g.appendChild(drop2);

  // Highlights (small white ovals on each droplet)
  const hl1 = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  hl1.setAttribute('cx', cx - scale*0.55); hl1.setAttribute('cy', cy - scale*0.75);
  hl1.setAttribute('rx', scale*0.1); hl1.setAttribute('ry', scale*0.15);
  hl1.setAttribute('fill', '#ffffff');
  g.appendChild(hl1);

  const hl2 = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  hl2.setAttribute('cx', cx + scale*0.6); hl2.setAttribute('cy', cy + scale*0.1);
  hl2.setAttribute('rx', scale*0.13); hl2.setAttribute('ry', scale*0.18);
  hl2.setAttribute('fill', '#ffffff');
  g.appendChild(hl2);

  svg.appendChild(g);
}

// ===== UTILS =====
function safeJSON(text) {
  try {
    const clean = text.replace(/```json\s*/gi,'').replace(/```/g,'').trim();
    const m = clean.match(/\{[\s\S]*\}/);
    return m ? JSON.parse(m[0]) : null;
  } catch { return null; }
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
